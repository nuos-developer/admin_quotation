<!-- ===================================================== -->
<!-- CLIENT PAGE -->
<!-- ===================================================== -->
<div class="sticky-bar">
    <!-- ================= HEADER ================= -->
    <div class="page-header">
        <h2>Clients</h2>
    </div>
    <!-- ================= SEARCH ================= -->
    <div class="search-box">
        <input type="text" class="search-input" placeholder="🔍 Search Client..." [(ngModel)]="searchText"
            (input)="filterClients()">
    </div>
    <!-- ================= LOADER ================= -->
    <div *ngIf="loading" class="loader-container">
        <div class="spinner"></div>
    </div>
    <!-- ===================================================== -->
    <!-- CLIENT TABLE -->
    <!-- ===================================================== -->
    <div class="table-wrapper" *ngIf="clients && clients.length > 0;">

    <table class="client-table">

        <thead>

            <tr>

                <th width="70">Sr. No.</th>

                <th width="120">Client Id</th>

                <th>Client Name</th>

                <th>Email</th>

                <th width="140">Mobile</th>

                <th>Created By</th>

                <th width="160">Role Name</th>

                <th width="120">Action</th>

            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let client of filteredClients; let i=index">

                <td width="70">{{i+1}}</td>

                <td width="120">{{client.client_id}}</td>

                <td>{{client.first_name}} {{client.last_name}}</td>

                <td>{{client.email_id}}</td>

                <td width="140">{{client.mobile_number}}</td>

                <td>{{client.user_name}}</td>

                <td width="160">{{client.role_name}}</td>

                <td width="120">

                    <div class="action-group">

                        <button
                            class="icon-btn view-btn"
                            (click)="viewClient(client)">

                            👁

                            <span class="tooltip-text">

                                View Client

                            </span>

                        </button>

                    </div>

                </td>

            </tr>

        </tbody>

    </table>

</div>
    <!-- ================= EMPTY ================= -->
    <div class="no-data" *ngIf="!loading && filteredClients.length === 0">
        No Clients Found

    </div>
</div>
<!-- ===================================================== -->
<!-- VIEW CLIENT MODAL -->
<!-- ===================================================== -->
<div class="modal" *ngIf="showModal">
    <div class="modal-box xlarge">
        <!-- ================= HEADER ================= -->
        <div class="modal-header">
            <h2 class="modal-title">
                Client Details

            </h2>
            <button type="button" class="close-btn" (click)="closeModal()">
                ✕

            </button>
        </div>
        <!-- ================= BODY ================= -->
        <div class="modal-body" *ngIf="selectedClient">
            <div class="form-grid">
                <!-- Client ID -->
                <div class="form-field">
                    <label>Client ID</label>
                    <input [value]="selectedClient.client_id" readonly>
                </div>
                <!-- Client Name -->
                <div class="form-field">
                    <label>Client Name</label>
                    <input [value]="selectedClient.first_name + ' ' + selectedClient.last_name" readonly>
                </div>
                <!-- Email -->
                <div class="form-field">
                    <label>Email</label>
                    <input [value]="selectedClient.email_id" readonly>
                </div>
                <!-- Mobile -->
                <div class="form-field">
                    <label>Mobile Number</label>
                    <input [value]="selectedClient.mobile_number" readonly>
                </div>
                <!-- Address 1 -->
                <div class="form-field">
                    <label>Address Line 1</label>
                    <input [value]="selectedClient.address_line_one" readonly>
                </div>
                <!-- Address 2 -->
                <div class="form-field">
                    <label>Address Line 2</label>
                    <input [value]="selectedClient.address_line_two" readonly>
                </div>
                <!-- Country -->
                <div class="form-field">
                    <label>Country</label>
                    <input [value]="selectedClient.country" readonly>
                </div>
                <!-- State -->
                <div class="form-field">
                    <label>State</label>
                    <input [value]="selectedClient.state" readonly>
                </div>
                <!-- District -->
                <div class="form-field">
                    <label>District</label>
                    <input [value]="selectedClient.district" readonly>
                </div>
                <!-- Pin Code -->
                <div class="form-field">
                    <label>Pin Code</label>
                    <input [value]="selectedClient.pin_code" readonly>
                </div>
                <!-- Company -->
                <div class="form-field">
                    <label>Company Name</label>
                    <input [value]="selectedClient.company_name" readonly>
                </div>
                <!-- Company Address -->
                <div class="form-field full-width">
                    <label>Company Address</label>
                    <textarea rows="3" readonly>{{ selectedClient.company_address }}</textarea>
                </div>
                <!-- GST -->
                <div class="form-field">
                    <label>GST Number</label>
                    <input [value]="selectedClient.gst" readonly>
                </div>
                <!-- Sales Rep -->
                <div class="form-field">
                    <label>Sales Representative</label>
                    <input [value]="selectedClient.salesrepincharge" readonly>
                </div>
                <!-- Installation Rep -->
                <div class="form-field">
                    <label>Installation Representative</label>
                    <input [value]="selectedClient.installation_rep_in_charge" readonly>
                </div>
                <!-- Installation Date -->
                <div class="form-field">
                    <label>Installation Date</label>
                    <input [value]="selectedClient.date_of_installation | date:'dd-MM-yyyy'" readonly>
                </div>
                <!-- Lead Source -->
                <div class="form-field">
                    <label>Lead Source</label>
                    <input [value]="selectedClient.lead_source" readonly>
                </div>
                <!-- Site Contractor -->
                <div class="form-field">
                    <label>Site Contractor</label>
                    <input [value]="selectedClient.site_contractor_name" readonly>
                </div>
                <!-- Contractor Phone -->
                <div class="form-field">
                    <label>Contractor Phone</label>
                    <input [value]="selectedClient.site_contractor_phone" readonly>
                </div>
                <!-- Architect -->
                <div class="form-field">
                    <label>Architect Name</label>
                    <input [value]="selectedClient.architect_name" readonly>
                </div>
                <!-- Architect Phone -->
                <div class="form-field">
                    <label>Architect Phone</label>
                    <input [value]="selectedClient.architect_phone" readonly>
                </div>
                <!-- Created By -->
                <div class="form-field">
                    <label>Created By</label>
                    <input [value]="selectedClient.user_name" readonly>
                </div>
                <!-- Role -->
                <div class="form-field">
                    <label>Role Name</label>
                    <input [value]="selectedClient.role_name" readonly>
                </div>
            </div>
        </div>
        <!-- ================= FOOTER ================= -->
        <div class="modal-footer">
            <button type="button" class="btn-cancel" (click)="closeModal()">
                Close

            </button>
        </div>
    </div>
</div>
